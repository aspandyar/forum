{{define "forumTable"}}
<div class="card table-card">
    <table>
        <tr>
            <th>Title</th>
            <th>Created</th>
            <th>Tags</th>
            <th>ID</th>
        </tr>
        {{range .Forums}}
        <tr>
            <td><a href='/forum/view/{{.ID}}'>{{.Title}}</a></td>
            <td>{{humanDate .Created}}</td>
            <td>{{.Tags}}</td>
            <td>#{{.ID}}</td>
        </tr>
        {{end}}
    </table>
</div>
{{end}}
